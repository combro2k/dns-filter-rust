listen:
  dns:
    enabled: true
    address: "0.0.0.0"
    port: 5353
  dot:
    enabled: false
    address: "0.0.0.0"
    port: 853
    tls:
      cert_path: "/etc/dns-filter/cert.pem"
      key_path: "/etc/dns-filter/key.pem"
      autogenerate: true
  doh:
    enabled: false
    address: "0.0.0.0"
    port: 443
    tls:
      cert_path: "/etc/dns-filter/cert.pem"
      key_path: "/etc/dns-filter/key.pem"
      autogenerate: true
  doq:
    enabled: false
    address: "0.0.0.0"
    port: 8853
    tls:
      cert_path: "/etc/dns-filter/cert.pem"
      key_path: "/etc/dns-filter/key.pem"
      autogenerate: true
  http:
    enabled: false
    address: "0.0.0.0"
    port: 8080
  metrics:
    enabled: false
    address: "127.0.0.1"
    port: 9100

blocklists:
  - adguard_base:
      enabled: true
      url: "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_2_Base/filter.txt"
      interval: "12h"
  - custom_ads:
      enabled: false
      url: "https://example.com/myadblock.txt"
      interval: "30m"

allowlists:
  - corporate_allow:
      enabled: false
      url: "https://example.com/allowlist.txt"
      interval: "1h"
  - boo:
      enabled: false
      url: "/etc/dns-filter/allowlist.txt"
  - local_allow:
      enabled: false
      url: "/etc/dns-filter/allowlist.txt"

filtering:
  sinkhole_ipv4: "0.0.0.0"
  sinkhole_ipv6: "::"
  # Optional persistent document cache for warm starts.
  # mode: "memory" (default) keeps cache in RAM only.
  # mode: "sqlite" persists list documents to a local SQLite file.
  cache:
    mode: "memory"
    document_path: "package/cache/filter-cache.db"

upstreams:
  strategy: "round_robin"
  bootstrap_resolvers:
    - "1.1.1.1"
  servers:
    - enabled: true
      protocol: "dns"
      address: "8.8.8.8:53"

logging:
  syslog:
    enabled: true
    facility: local0
    level: info
  file:
    enabled: false
    location: /var/log/dns-filter.log
    level: debug
  stdout:
    enabled: true
    level: debug
