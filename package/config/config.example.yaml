# =============================================================================
# dns-filter configuration
# =============================================================================
# Infrastructure settings (listen, logging, security, control, database) are
# always read from this YAML file.
#
# Operational settings (blocklists, allowlists, filtering, resolvers, zones)
# are seeded into the database on first start.  After that the database is
# the authoritative source for operational config.
# =============================================================================

# ---------------------------------------------------------------------------
# Listener configuration
# ---------------------------------------------------------------------------
# Only dns is required; all other listeners default to absent (disabled).
# Addresses default: ["0.0.0.0", "::"] for public, ["127.0.0.1", "::1"] for metrics.
listen:
  dns:
    enabled: true
    port: 53
    addresses: ["0.0.0.0", "::"]      # serde default

  # dot:
  #   enabled: true
  #   port: 853
  #   addresses: ["0.0.0.0", "::"]
  #   tls:
  #     cert_path: "certs/cert.pem"
  #     key_path: "certs/key.pem"
  #     autogenerate: true

  # doh:
  #   enabled: true
  #   port: 443
  #   addresses: ["0.0.0.0", "::"]
  #   tls:
  #     cert_path: "certs/cert.pem"
  #     key_path: "certs/key.pem"
  #     autogenerate: true

  # doq:
  #   enabled: true
  #   addresses: ["0.0.0.0", "::"]
  #   port: 8853
  #   tls:
  #     cert_path: "certs/cert.pem"
  #     key_path: "certs/key.pem"
  #     autogenerate: true

  # admin:
  #   enabled: true
  #   addresses: ["0.0.0.0", "::"]
  #   port: 80                         # HTTP — serves UI or redirects to tls_port
  #   tls_port: 8443                    # HTTPS — only active when tls is configured
