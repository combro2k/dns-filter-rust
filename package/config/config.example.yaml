listen:
  dns:
    enabled: true
    addresses:
      - "::"
    port: 53
  dot:
    enabled: false
    addresses: 
      - "::"
    port: 853
    tls:
      cert_path: "/etc/dns-filter/cert.pem"
      key_path: "/etc/dns-filter/key.pem"
      autogenerate: true
  doh:
    enabled: false
    addresses:
      - "::"
    port: 443
    tls:
      cert_path: "/etc/dns-filter/cert.pem"
      key_path: "/etc/dns-filter/key.pem"
      autogenerate: true
    # Optional Bearer token required for inbound DoH queries.
    # When set, clients must include "Authorization: Bearer <token>" in requests.
    # auth_token: "my-secret-token"
  doq:
    enabled: false
    addresses:
      - "::"
    port: 8853
    tls:
      cert_path: "/etc/dns-filter/cert.pem"
      key_path: "/etc/dns-filter/key.pem"
      autogenerate: true
  http:
    enabled: false
    addresses:
      - "::"
    port: 8080
  metrics:
    enabled: false
    addresses:
      - "::1"
    port: 9100

blocklists:
  - adguard_base:
      enabled: true
      url: "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_2_Base/filter.txt"
      interval: "12h"
  - custom_ads:
      enabled: false
      url: "https://example.com/myadblock.txt"
      interval: "30m"

allowlists:
  - corporate_allow:
      enabled: false
      url: "https://example.com/allowlist.txt"
      interval: "1h"
  - boo:
      enabled: false
      url: "/etc/dns-filter/allowlist.txt"
  - local_allow:
      enabled: false
      url: "/etc/dns-filter/allowlist.txt"

filtering:
  sinkhole_ipv4: "0.0.0.0"
  sinkhole_ipv6: "::"
  # Optional policy for incoming QTYPE=ANY queries:
  # - "notimp" (default): reply NOTIMP locally, matching RFC 8482 behavior
  # - "refused": reply REFUSED locally
  # - "passthrough": forward ANY upstream as-is (may cause SERVFAIL noise)
  any_query_policy: "notimp"
  # Optional persistent document cache for warm starts.
  # mode: "memory" (default) keeps cache in RAM only.
  # mode: "sqlite" persists list documents to a local SQLite file.
  cache:
    mode: "memory"
    document_path: "/var/lib/dns-filter/filter-cache.db"

resolvers:
  strategy: "round_robin"
  bootstrap_resolvers:
    - "1.1.1.1"
  servers:
    - enabled: false
      protocol: "dns"
      address: "8.8.8.8:53"
    - enabled: false
      protocol: "dns"
      address: "1.1.1.1:53"
    - enabled: false
      protocol: "dot"
      address: "dns.google:853"
      tls:
        cert_path: "/etc/dns-filter/upstream-cert.pem"
        autogenerate: true
    - enabled: false
      protocol: "doh"
      address: "https://dns.google/dns-query"
      tls:
        cert_path: "/etc/dns-filter/upstream-cert.pem"
        autogenerate: true
    - enabled: false
      protocol: "doq"
      address: "dns.google:8853"
      tls:
        cert_path: "/etc/dns-filter/upstream-cert.pem"
        autogenerate: true
    - enabled: true
      protocol: "recursive"
      # root_hints_path: "/usr/share/dns/root.hints"  # optional, auto-detected or compiled-in fallback
      # root_key_path: "/usr/share/dns/root.key"  # optional, auto-detected or compiled-in fallback
      # max_hops: 12  # optional, default is 12
      nameserver_ip_family: "ipv4"  # optional: "ipv4" (IPv4 only), "ipv6" (IPv6 only), or omit for both
      dnssec: true  # enable DNSSEC chain-of-trust validation (default: true)
  zones:
    # Zone mode is strict: choose exactly one of:
    # 1) forwarding mode via servers[]
    # 2) authoritative mode via zone_source (JSON file or HTTP/HTTPS URL)
    - zone: "home.arpa"
      enabled: false
      bypass_filter: true
      fallback_to_default_resolvers: false
      strategy: "failover"
      servers: []
    # Zone forwarding with DoH upstream and optional Bearer auth.
    # - zone: "corp.example"
    #   enabled: false
    #   bypass_filter: false
    #   fallback_to_default_resolvers: false
    #   strategy: "failover"
    #   servers:
    #     - enabled: true
    #       protocol: "doh"
    #       address: "https://dns.corp.example/dns-query"
    #       # authentication:
    #       #   token: "my-bearer-token"
    # Zone authority from a local JSON file.
    # - zone: "example.com"
    #   enabled: false
    #   bypass_filter: false
    #   fallback_to_default_resolvers: false
    #   servers:
    #     - enabled: true
    #       protocol: "json"
    #       address: "file:///etc/dns-filter/zones/example.com.json"
    # Zone authority from an HTTP(S) URL with periodic refresh.
    # - zone: "example.net"
    #   enabled: false
    #   bypass_filter: false
    #   fallback_to_default_resolvers: false
    #   servers:
    #     - enabled: true
    #       protocol: "json"
    #       address: "https://zones.example.net/example.net.json"
    #       check_interval: "15m"
    #       # Use either token (Bearer) OR username+password (Basic), not both.
    #       # authentication:
    #       #   token: "my-bearer-token"
    #       # Or for Basic authentication:
    #       # authentication:
    #       #   username: "user"
    #       #   password: "secret"
    - zone: "168.192.in-addr.arpa"
      enabled: false
      bypass_filter: true
      fallback_to_default_resolvers: false
      strategy: "failover"
      servers: []

# WASM plugins (requires 'plugins' cargo feature)
# plugins:
#   - name: "example-plugin"
#     path: "/etc/dns-filter/plugins/example.wasm"
#     enabled: true
plugins: []

logging:
  syslog:
    enabled: true
    # Syslog transport: "unix" (default local), "udp", "tcp", or "tls".
    transport: "unix"
    # For transport "unix": a socket path (default: /dev/log).
    # For network transports: host:port (e.g. 192.0.2.10:514).
    server: "/dev/log"
    # Syslog message format: "rfc3164" (default) or "rfc5424".
    format: "rfc3164"
    facility: local0
    level: info
    # TLS settings are only used when transport: "tls".
    # tls:
    #   ca_cert_path: "/etc/ssl/certs/ca-certificates.crt"
    #   verify_hostname: true
  file:
    enabled: false
    location: /var/log/dns-filter.log
    level: debug
  stdout:
    enabled: false
    level: debug

# Security settings: privilege dropping after socket bind.
# The process starts as root to bind privileged ports, then drops to an
# unprivileged user/group and chroots into a restricted directory.
# CAP_NET_BIND_SERVICE is retained on Linux for potential rebinds on reload.
#
# NOTE: After chroot, config files and blocklist caches must be accessible
# from within the chroot directory (e.g. bind-mount or copy into it).
security:
  user: "nobody"
  group: "nogroup"
  chroot_dir: "/var/lib/dns-filter"

# REST API for runtime administration.
# Provides endpoints for reloading config, refreshing lists, toggling
# filtering, viewing stats, and query logging.
# All /api/* endpoints require a Bearer token when api_token is set.
# The /health endpoint is always unauthenticated.
api:
  enabled: false
  address: "0.0.0.0"
  port: 8000
  # Optional Bearer token for API authentication.
  # When set, all /api/* requests must include: Authorization: Bearer <token>
  # api_token: "change-me-to-a-secure-value"
  query_logging:
    enabled: false
    max_entries: 10000

# Control socket for CLI-based daemon management (stop, reload).
# The daemon listens on this Unix socket for JSON control commands.
# CLI subcommands (dns-filter stop, dns-filter reload) connect here.
control:
  socket_path: "/run/dns-filter/dns-filter.sock"