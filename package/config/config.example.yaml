# MCP (Model Context Protocol) server for AI/LLM tool integration.
# Requires the 'mcp' feature flag: cargo build --features mcp
# Default from struct: absent (disabled).
# mcp:
#   enabled: true
#   port: 8953                           # default
#   api_token: "change-me"
#   sse_keep_alive: 30
#   stateful_mode: true                  # default
#   json_response: false                 # default
#   allowed_origins: []                  # default

# ---------------------------------------------------------------------------
# ACME automatic certificate management (Let's Encrypt)
# ---------------------------------------------------------------------------
# Requires the 'acme' feature flag: cargo build --features acme
# Default from struct: absent (disabled).
#
# When enabled, obtains and auto-renews TLS certificates via the ACME protocol
# (RFC 8555) using DNS-01 challenges with Cloudflare DNS API. Certificates are
# shared across all TLS listeners (DoT, DoH, DoQ) with zero-downtime hot-reload.
#
# The DNS-01 challenge type supports wildcard certificates and does not require
# port 80 to be publicly accessible.
#
# acme:
#   enabled: true
#   directory_url: "https://acme-v02.api.letsencrypt.org/directory"   # production (default)
#   # directory_url: "https://acme-staging-v02.api.letsencrypt.org/directory"  # staging/testing
#   domains:
#     - "dns.example.com"
#     - "*.dns.example.com"             # wildcard supported with DNS-01
#   email: "admin@example.com"
#   cert_path: "certs/acme-cert.pem"    # default
#   key_path: "certs/acme-key.pem"      # default
#   account_credentials_path: "certs/acme-account.json"  # default
#   renew_before_expiry: "30d"          # default — renew when <30 days remain
#   dns_provider:
#     type: "cloudflare"
#     api_token: "${CF_DNS_API_TOKEN}"   # env var, or literal value
#     # zone_id: "abc123..."            # optional — auto-detected from domain if omitted

# ---------------------------------------------------------------------------
# Blocklists — domains to block
# ---------------------------------------------------------------------------
# Default from struct: empty list.
# Supported list_type values:
#   "adguard"  — AdGuard/ABP filter syntax (default)
#   "hosts"    — hosts file format (including compressed multi-hostname lines)
#   "rpz"      — Response Policy Zone format
#   "domains"  — flat domain list, one domain per line
#   "wildcard" — wildcard domain list, *.example.com per line
blocklists: []
# - adguard_base:
#     enabled: true
#     url: "https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_2_Base/filter.txt"
#     interval: "12h"
#     # list_type: "adguard"  # default
# - custom_ads:
#     enabled: false
#     url: "https://example.com/myadblock.txt"
#     interval: "30m"
#     # list_type: "adguard"  # default
# - stevenblack_hosts:
#     enabled: false
#     url: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
#     interval: "12h"
#     list_type: "hosts"
# - rpz_blocklist:
#     enabled: false
#     url: "https://example.com/rpz-zone.txt"
#     interval: "6h"
#     list_type: "rpz"
# - simple_domains:
#     enabled: false
#     url: "https://example.com/domains.txt"
#     interval: "12h"
#     list_type: "domains"
# - wildcard_ads:
#     enabled: false
#     url: "https://example.com/wildcards.txt"
#     interval: "12h"
#     list_type: "wildcard"

# ---------------------------------------------------------------------------
# Allowlists — exceptions that bypass filtering
# ---------------------------------------------------------------------------
# Default from struct: empty list.
# Allowlists take precedence over blocklists.
allowlists: []
# - corporate_allow:
#     enabled: false
#     url: "https://example.com/allowlist.txt"
#     interval: "1h"
# - local_allow:
#     enabled: false
#     url: "/etc/dns-filter/allowlist.txt"

# ---------------------------------------------------------------------------
# Filtering behaviour
# ---------------------------------------------------------------------------
# Default from struct: absent (None).
# When absent, code applies these internal defaults:
#   sinkhole_ipv4: "0.0.0.0"
#   sinkhole_ipv6: "::"
#   any_query_policy: "notimp"           # "notimp", "refused", or "passthrough"
filtering:
  sinkhole_ipv4: "0.0.0.0"
  sinkhole_ipv6: "::"
  any_query_policy: "notimp"

# ---------------------------------------------------------------------------
# Outbound routing (optional)
# ---------------------------------------------------------------------------
# Default from struct: absent (None). No outbound routing applied.
# Global defaults for upstream DNS connections. Use to route queries through
# a specific interface (e.g. WireGuard) or apply policy routing via SO_MARK.
# Per-server bind_address/fwmark overrides these defaults.
# outbound:
#   bind_address: "10.0.0.2"            # Source IP to bind upstream sockets to
#   fwmark: 51820                       # Linux SO_MARK for policy routing (needs CAP_NET_ADMIN, must be present after chroot/priv drop)

# ---------------------------------------------------------------------------
# Upstream resolvers
# ---------------------------------------------------------------------------
resolvers:
  # Load-balancing strategy: "round_robin", "random", or "failover"
  strategy: "round_robin"

  # DNS response cache. Default from struct: absent (None).
  # When absent, code defaults to enabled: true with no TTL bounds.
  cache:
    enabled: true
    max_entries: 10000           # default
    min_ttl: "60s"
    max_ttl: "1h"

  # Default from struct: ["194.242.2.2", "2a07:e340::2"]
  # Mullvad no-filtering DNS (used to resolve DoH hostnames at startup)
  bootstrap_resolvers:
    - "194.242.2.2"
    - "2a07:e340::2"

  servers:
    - enabled: true
      protocol: "doh"
      address: "https://dns.mullvad.net/dns-query"

    # Example: recursive resolver
    # - enabled: true
    #   protocol: "recursive"
    #   # dnssec: true                         # default: true
    #   # nameserver_ip_family: "ipv4"       # "ipv4", "ipv6", or omit for both
    #   # root_hints_path: "/usr/share/dns/root.hints"   # auto-detected
    #   # root_key_path: "/usr/share/dns/root.key"       # auto-detected
    #   # max_hops: 12                                    # default: 12

    # Optional examples
    # - enabled: true
    #   protocol: "dns"
    #   address: "8.8.8.8:53"
    # - enabled: true
    #   protocol: "dns"
    #   address: "1.1.1.1:53"
    # - enabled: true
    #   protocol: "dot"
    #   address: "dns.google:853"
    # - enabled: true
    #   protocol: "doh"
    #   address: "https://dns.google/dns-query"
    # - enabled: true
    #   protocol: "doq"
    #   address: "dns.google:8853"

  # -------------------------------------------------------------------------
  # Zone forwarding / zone authority
  # -------------------------------------------------------------------------
  # Default from struct: empty list.
  # Choose exactly one mode per zone:
  #   1) Forwarding  — route queries to zone-specific servers[]
  #   2) Authoritative — serve records from a JSON zone_source
  zones: []

  # Zone forwarding with DoH upstream and optional Bearer auth
  # - zone: "corp.example"
  #   enabled: false
  #   bypass_filter: false
  #   fallback_to_default_resolvers: false
  #   strategy: "failover"
  #   servers:
  #     - enabled: true
  #       protocol: "doh"
  #       address: "https://dns.corp.example/dns-query"
  #       # authentication:
  #       #   token: "my-bearer-token"

  # Zone authority from a local JSON file
  # - zone: "example.com"
  #   enabled: false
  #   bypass_filter: false
  #   fallback_to_default_resolvers: false
  #   servers:
  #     - enabled: true
  #       protocol: "json"
  #       address: "file:///etc/dns-filter/zones/example.com.json"

  # Zone authority from an HTTP(S) URL with periodic refresh
  # - zone: "example.net"
  #   enabled: false
  #   bypass_filter: false
  #   fallback_to_default_resolvers: false
  #   servers:
  #     - enabled: true
  #       protocol: "json"
  #       address: "https://zones.example.net/example.net.json"
  #       check_interval: "15m"
  #       # authentication:
  #       #   token: "my-bearer-token"        # Bearer
  #       # authentication:                   # ...or Basic
  #       #   username: "user"
  #       #   password: "secret"

  # -------------------------------------------------------------------------
  # Zone discovery — auto-import zones from a JSON index endpoint
  # -------------------------------------------------------------------------
  # Fetches {"zones": [{"href":…, "name":…, "type":…}, …]} and follows each
  # href to load zone records.  Explicit zones above take priority.
  zone_discovery: []
  # - enabled: false
  #   address: "https://router.home.arpa/zones"
  #   check_interval: "15m"
  #   allowed_types:                     # "reverse", "forward", "reverse-aggregate"
  #     - "reverse"
  #     - "forward"
  #     - "reverse-aggregate"
  #   bypass_filter: true
  #   fallback_to_default_resolvers: false
  #   # authentication:
  #   #   token: "my-bearer-token"

# ---------------------------------------------------------------------------
# WASM plugins (requires 'plugins' cargo feature)
# ---------------------------------------------------------------------------
# plugins:
#   - name: "example-plugin"
#     path: "/etc/dns-filter/plugins/example.wasm"
#     enabled: true
plugins: []

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
# Required section. All sub-loggers default to absent (None = no output).
logging:
  # syslog:
  #   enabled: true
  #   transport: "unix"                  # "unix" (default), "udp", "tcp", "tls"
  #   server: "/dev/log"                 # socket path or host:port
  #   format: "rfc3164"                  # "rfc3164" (default) or "rfc5424"
  #   facility: local0
  #   level: info
  #   # tls:
  #   #   ca_cert_path: "/etc/ssl/certs/ca-certificates.crt"
  #   #   verify_hostname: true
  # file:
  #   enabled: false
  #   location: /var/log/dns-filter.log
  #   level: debug
  stdout:
    enabled: true
    level: info

# ---------------------------------------------------------------------------
# Security — privilege dropping after socket bind
# ---------------------------------------------------------------------------
# Default from struct: absent (None).
# When absent, code applies these internal defaults:
#   user: "nobody"
#   group: "nogroup"
#   chroot_dir: "/var/lib/dns-filter"
#
# The process starts as root to bind privileged ports, then drops to an
# unprivileged user/group and optionally chroots.
# CAP_NET_BIND_SERVICE is retained on Linux for potential rebinds on reload.
#
# NOTE: After chroot, config files and caches must be accessible from within
# the chroot directory (e.g. bind-mount or copy into it).
# security:
#   user: "nobody"
#   group: "nogroup"
#   chroot_dir: "/var/lib/dns-filter"

# ---------------------------------------------------------------------------
# REST API — runtime administration
# ---------------------------------------------------------------------------
# Default from struct: absent (None = standalone API disabled).
# The admin listener (`listen.admin`) always embeds the full API on its own
# port, so a separate API listener is only needed for headless/API-only use.
# All /api/* endpoints require a Bearer token when api_token is set.
# The /health endpoint is always unauthenticated.
# api:
#   enabled: false
#   address: "0.0.0.0"                  # default
#   port: 8000                          # default
#   # api_token: "change-me-to-a-secure-value"
#   # tls:
#   #   cert_path: "certs/api-cert.pem"
#   #   key_path: "certs/api-key.pem"
#   #   autogenerate: true
#   query_logging:
#     enabled: false                    # default
#     max_entries: 10000                # default

# ---------------------------------------------------------------------------
# Control socket — CLI-based daemon management (stop, reload)
# ---------------------------------------------------------------------------
# Default from struct: absent (None).
# When absent, code uses default socket_path: "run/dns-filter.sock"
# (relative paths resolved from security.chroot_dir).
control:
  socket_path: "run/dns-filter.sock"

# ---------------------------------------------------------------------------
# Database — operational config storage
# ---------------------------------------------------------------------------
# Default from struct: absent (None).
# When absent, code uses default URL: "sqlite://db/dns-filter.db"
#
# Supported backends (compile-time feature flags):
#   db-sqlite   (default)   sqlite://db/dns-filter.db
#   db-mysql                mysql://user:pass@localhost/dns_filter
#   db-postgres             postgres://user:pass@localhost/dns_filter
database:
  url: "sqlite://db/dns-filter.db"
