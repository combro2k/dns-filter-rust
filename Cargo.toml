[package]
name = "dns-filter"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_path_to_error = "0.1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
prometheus = "0.13"
hyper = { version = "0.14", features = ["full"] }
hickory-client = { version = "0.25", features = ["dnssec-ring", "tls-ring", "webpki-roots"] }
thiserror = "1.0"
anyhow = "1.0"
async-trait = "0.1"
rand = "0.8"
futures = "0.3"
